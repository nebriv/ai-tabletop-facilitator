name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    # Validate the build + Trivy gate on every PR that touches the
    # runtime image, BEFORE merge. Catches regressions that the
    # original push-only setup couldn't surface until after merge,
    # without exposing a write-scoped GITHUB_TOKEN to PR-side code:
    # the pr-validate job below runs with the workflow-default
    # ``contents: read`` only — the write scopes that build-and-push
    # needs are granted at the job level, not the workflow level.
    branches: ["main"]
    paths:
      # Anything that ends up in the image, plus the workflow itself.
      # Pure docs / design / test-only PRs don't need a Trivy scan.
      - "docker/**"
      - "backend/pyproject.toml"
      - "backend/app/**"
      - "backend/scenarios/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"

permissions:
  # Workflow-level default. Per-job blocks below grant additional
  # scope ONLY to build-and-push (push events). The pr-validate job
  # inherits this read-only default — its GITHUB_TOKEN cannot push
  # to GHCR or upload SARIF, so untrusted PR-side code never sees a
  # write-scoped token. The previous revision of this workflow set
  # ``packages: write`` and ``security-events: write`` at workflow
  # level, which meant every job — including PR runs — got those
  # scopes in $GITHUB_TOKEN even though step-level ``if:`` gates
  # never USED them. Splitting fixes the principle-of-least-
  # privilege violation.
  contents: read

env:
  REGISTRY: ghcr.io
  # ``github.repository`` preserves the upstream casing (e.g.
  # ``nebriv/Crittable``). GHCR rejects uppercase characters in image
  # names, so we lowercase before passing to docker/metadata-action.
  # The shell-side conversion happens once in the ``image-name`` step
  # below; ``IMAGE_NAME`` here is just the raw input.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pr-validate:
    # Same build + Trivy gate as build-and-push, but no GHCR login,
    # no SARIF upload, no publish — and a read-only GITHUB_TOKEN
    # (inherited from workflow-level ``contents: read``). Failing
    # this gate blocks PR merge the same way build-and-push blocks
    # publish on push events.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: image-name
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.name }}
          # PR-side only needs an identifier for the local image; no
          # ``latest`` / semver tags here because nothing publishes.
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: First tag (Trivy needs a single ref)
        id: scan-target
        run: |
          first_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "ref=${first_tag}" >> "$GITHUB_OUTPUT"

      - name: Build (load locally for scan, do NOT push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Read from main's cache; do NOT write back from PR runs.
          # ``cache-to`` is intentionally omitted — untrusted PR code
          # shouldn't be able to write into a cache that main's
          # subsequent build then consumes.
          cache-from: type=gha
          # ``CACHEBUST=<run id>`` invalidates the apt + pip layers in
          # the Dockerfile so debian-security updates and pip's
          # latest-compatible resolution actually take effect on every
          # build, instead of the GHA cache replaying a layer captured
          # weeks ago. The base-image FROM still hits cache; only the
          # apt/pip layers below the ARG are forced to rebuild.
          build-args: |
            CACHEBUST=${{ github.run_id }}

      - name: Trivy image scan (HIGH,CRITICAL) — prints CVEs AND gates merge
        # Single gating step. ``format: table`` writes the CVE table
        # to this step's stdout so a failed PR check is self-documenting
        # — reviewers don't have to click into a sibling step (or the
        # Security tab, which PR runs don't even populate) to find
        # which CVE blocked the merge. ``exit-code: "1"`` makes any
        # HIGH/CRITICAL finding fail the PR check.
        #
        # SHA pin (resolves to v0.36.0) per the recommendation in
        # GHSA-69fq-xp46-6x23 / CVE-2026-33634 (the March 2026
        # supply-chain compromise that force-pushed 76 of 77
        # ``trivy-action`` tags to malicious commits with an
        # infostealer). v0.36.0 itself is in the post-incident safe
        # range (v0.35.0+ are v-prefixed and clean), but a SHA pin
        # forecloses on any future tag-move attack — the only way
        # this resolves to malicious code now is if the SHA itself
        # is poisoned, which would require a fundamentally different
        # attack. Dependabot still bumps this; the comment is the
        # human-readable version label.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-target.outputs.ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library

  build-and-push:
    # Push/tag side: full pipeline including registry login, SARIF
    # upload, and GHCR publish. Job-level permissions grant the
    # write scopes the steps require; the workflow-level read-only
    # default keeps every other job (including pr-validate) from
    # ever seeing those scopes.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for the Trivy step's SARIF upload to GitHub Code Scanning.
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name (GHCR requires lowercase)
        id: image-name
        run: |
          # ``${IMAGE_NAME,,}`` is bash 4+ lowercase parameter expansion.
          # GitHub Actions' ubuntu-latest runner ships bash 5.x by
          # default so this is safe; tcsh/zsh users running locally
          # would need to swap to ``tr '[:upper:]' '[:lower:]'``.
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: First tag (Trivy needs a single ref)
        id: scan-target
        run: |
          # ``steps.meta.outputs.tags`` is a newline-separated list; Trivy
          # scans a single image ref. Pick the first tag (deterministic
          # ordering from docker/metadata-action) — every tag in the list
          # points at the same digest, so the choice is arbitrary.
          first_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "ref=${first_tag}" >> "$GITHUB_OUTPUT"

      - name: Build (load locally for scan, do NOT push yet)
        # Build into the local Docker daemon with ``load: true`` so Trivy
        # can scan the resulting image before anything is published. We
        # still write the build cache so the follow-up push step is a
        # cache hit and effectively just re-tags + uploads layers.
        # ``load: true`` requires a single platform; we already pin
        # ``linux/amd64`` so this is fine.
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # See pr-validate's matching comment: ``CACHEBUST`` forces
          # the apt + pip layers to rebuild on every run so security
          # patches actually land in the published image.
          build-args: |
            CACHEBUST=${{ github.run_id }}

      - name: Trivy image scan (HIGH,CRITICAL) — prints CVEs AND gates the push
        # Single gating step. ``format: table`` writes the CVE table
        # directly to this step's stdout, so a failed run is
        # self-documenting in its own log — no need to click into a
        # sibling step or the Security tab to find out *which* CVE
        # tripped the gate (which is what the previous two-step
        # informational+SARIF pattern forced operators to do).
        # ``exit-code: "1"`` fails this step on any HIGH/CRITICAL
        # finding, which causes the Push step below to skip (default
        # ``if: success()``) so no vulnerable image is ever published.
        # ``ignore-unfixed`` keeps the gate from blocking on CVEs with
        # no upstream patch — the scheduled security.yml run is the
        # catch-all for "still no fix after a week" tracking.
        # SHA pinned per GHSA-69fq-xp46-6x23 / CVE-2026-33634 — see
        # pr-validate's matching comment for the supply-chain context.
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-target.outputs.ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library

      - name: Trivy SARIF re-scan for Code Scanning upload
        # Runs whether the gate passed or failed (``if: always()``) so
        # findings always reach the Security tab regardless of build
        # outcome. ``exit-code: "0"`` because the gate above is the
        # authoritative pass/fail decision — this step is upload-only.
        # The duplicate scan adds ~15s to the run but keeps the gate
        # log readable (table → stdout) AND the Code Scanning tab
        # populated (SARIF → upload-sarif) without the two responsibilities
        # leaking into each other.
        if: always()
        # SHA pinned per GHSA-69fq-xp46-6x23 / CVE-2026-33634 — see
        # pr-validate's matching comment for the supply-chain context.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.scan-target.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          vuln-type: os,library

      - name: Upload Trivy SARIF to Code Scanning
        # Always upload, even if the gate failed — findings land in the
        # Security tab and can be triaged from there.
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Push (only if scan passed)
        # Re-runs the build with the same inputs to publish to GHCR.
        # The previous build's ``cache-to`` populated the gha cache, so
        # this is a near-instant cache hit — no real rebuild happens.
        # Skipped automatically if the Trivy step failed because steps
        # default to ``if: success()``.
        #
        # ``build-args`` must match the scan step exactly. ``CACHEBUST``
        # is referenced inside the apt RUN, so it's part of every
        # downstream layer's cache key. If we omit it here, this step
        # defaults to ``CACHEBUST=1`` (the Dockerfile fallback), which
        # is a different cache key than ``CACHEBUST=${{ github.run_id }}``
        # — pip and apt layers would rebuild, possibly hitting older
        # cached layers that have CVEs we just gated against. Passing
        # the same value guarantees a cache hit on the layers the
        # scan validated, so what we push is byte-identical to what
        # Trivy approved.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            CACHEBUST=${{ github.run_id }}
